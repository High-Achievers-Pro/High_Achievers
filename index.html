<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>High Achievers</title>
    <link rel="stylesheet" href="./src/styles/main.css" />
    <script defer src="./src/js/main.js"></script>
  </head>
  <body>
    <!-- Source of truth lives in ./src/index.html -->
    <noscript>This site works best with JavaScript enabled.</noscript>
    <!-- Keep a single entry point so local servers serve /index.html at root -->
    <main id="app"></main>
    <script>
      // Simple include-style load: render the src HTML into #app for now.
      // (This keeps a scalable /src structure without needing a bundler yet.)
      fetch("./src/index.html")
        .then((r) => r.text())
        .then((html) => {
          const doc = new DOMParser().parseFromString(html, "text/html");
          const body = doc.body;
          document.querySelector("#app").replaceWith(...body.childNodes);
          window.dispatchEvent(new Event("ha:ready"));
        })
        .catch(() => {
          document.body.innerHTML =
            "<p style='color:white;font-family:system-ui;padding:24px'>Could not load app. Run a local server (not file://).</p>";
        });
    </script>
  </body>
</html>
